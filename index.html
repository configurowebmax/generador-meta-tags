<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Meta Tags SEO Gratis | ConfiguroWeb</title>
    <meta name="description" content="Genera meta tags SEO y Open Graph para tu web. Title, description, keywords, Twitter Cards y mas. Gratis.">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold text-cyan-600">Configuro<span class="text-slate-900">Web</span></span>
            <a href="https://configuroweb.com/tag/gratis" class="text-sm font-medium text-slate-600 hover:text-cyan-600">← Volver a Apps Gratuitas</a>
        </div>
    </header>
    <main class="max-w-5xl mx-auto px-4 py-8 flex-grow w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">Generador de Meta Tags SEO</h1>
            <p class="text-slate-500 text-sm">Crea etiquetas SEO y Open Graph optimizadas para tu sitio web.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">Título (Title) <span id="titleCount" class="text-slate-400">0/60</span></label>
                    <input type="text" id="title" maxlength="70" oninput="generate()" placeholder="Título de tu página" class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:border-cyan-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">Descripción (Description) <span id="descCount" class="text-slate-400">0/160</span></label>
                    <textarea id="description" rows="3" maxlength="200" oninput="generate()" placeholder="Descripción de tu página" class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm resize-none focus:outline-none focus:border-cyan-500"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">Keywords (separadas por coma)</label>
                    <input type="text" id="keywords" oninput="generate()" placeholder="palabra1, palabra2, palabra3" class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:border-cyan-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">URL de la página</label>
                    <input type="url" id="url" oninput="generate()" placeholder="https://tusitio.com" class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:border-cyan-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">URL de la imagen (OG)</label>
                    <input type="url" id="image" oninput="generate()" placeholder="https://tusitio.com/imagen.jpg" class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:border-cyan-500">
                </div>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="twitter" checked onchange="generate()" class="w-4 h-4 accent-cyan-600">
                    <span class="text-sm">Incluir Twitter Cards</span>
                </label>
            </div>

            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs text-slate-500 uppercase">Código generado</label>
                    <button onclick="copyCode()" class="text-xs text-cyan-600 hover:underline cursor-pointer">📋 Copiar</button>
                </div>
                <textarea id="output" readonly class="mono w-full h-96 bg-slate-900 text-slate-100 rounded-xl p-4 text-xs resize-none focus:outline-none"></textarea>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t border-slate-200 mt-12">
        <div class="max-w-5xl mx-auto px-4 py-6 text-center text-xs text-slate-400">&copy; 2026 ConfiguroWeb.</div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', generate);

        function esc(s) { return (s || '').replace(/"/g, '"'); }

        function generate() {
            const title = document.getElementById('title').value;
            const desc = document.getElementById('description').value;
            const kw = document.getElementById('keywords').value;
            const url = document.getElementById('url').value;
            const img = document.getElementById('image').value;
            const tw = document.getElementById('twitter').checked;

            document.getElementById('titleCount').innerText = `${title.length}/60`;
            document.getElementById('descCount').innerText = `${desc.length}/160`;

            let out = '';
            if (title) out += `<title>${esc(title)}</title>\n`;
            if (desc) out += `<meta name="description" content="${esc(desc)}">\n`;
            if (kw) out += `<meta name="keywords" content="${esc(kw)}">\n`;
            out += `<meta name="robots" content="index, follow">\n`;
            out += `<meta name="author" content="">\n`;
            if (url) {
                out += `<meta property="og:type" content="website">\n`;
                out += `<meta property="og:url" content="${esc(url)}">\n`;
            }
            if (title) out += `<meta property="og:title" content="${esc(title)}">\n`;
            if (desc) out += `<meta property="og:description" content="${esc(desc)}">\n`;
            if (img) out += `<meta property="og:image" content="${esc(img)}">\n`;
            if (tw) {
                out += `<meta name="twitter:card" content="summary_large_image">\n`;
                if (title) out += `<meta name="twitter:title" content="${esc(title)}">\n`;
                if (desc) out += `<meta name="twitter:description" content="${esc(desc)}">\n`;
                if (img) out += `<meta name="twitter:image" content="${esc(img)}">\n`;
            }
            document.getElementById('output').value = out.trim();
        }

        function copyCode() {
            const el = document.getElementById('output');
            el.select();
            navigator.clipboard.writeText(el.value);
        }
    </script>
</body>
</html>
